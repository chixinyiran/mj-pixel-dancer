<!DOCTYPE html>
<!-- v20260616 · iOS26.5模拟器+WebKit双层验证 28项全过 -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MJ · 像素舞者 × Web Audio</title>
<style>
  :root{
    --bg:#07060d; --panel:rgba(22,18,40,.72); --line:rgba(255,255,255,.08);
    --gold:#f5c542; --hot:#ff2e6e; --cyan:#37e6ff; --violet:#9b5cff;
    --txt:#f4f1ff; --sub:#9b93b8; color-scheme:dark;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"PingFang SC","Microsoft YaHei",-apple-system,BlinkMacSystemFont,sans-serif;
    background:
      radial-gradient(1200px 600px at 18% -12%, rgba(155,92,255,.22), transparent 60%),
      radial-gradient(1000px 500px at 92% 8%, rgba(255,46,110,.18), transparent 55%),
      radial-gradient(900px 700px at 50% 122%, rgba(55,230,255,.15), transparent 60%),
      var(--bg);
    color:var(--txt); height:100vh; padding:10px 16px 8px; overflow:hidden;
    -webkit-user-select:none;user-select:none;
    display:flex;flex-direction:column;
  }
  .wrap{max-width:1280px;margin:0 auto;width:100%;flex:1;display:flex;flex-direction:column;gap:14px;min-height:0;}
  header{text-align:center;flex:none;padding:6px 0 2px;}
  .eyebrow{letter-spacing:.42em;font-size:10px;color:var(--gold);font-weight:700;text-transform:uppercase;margin-bottom:12px;}
  h1{
    font-size:clamp(22px,3.4vw,34px);font-weight:900;line-height:1.0;margin:0 0 13px;
    background:linear-gradient(100deg,var(--gold),var(--hot) 45%,var(--violet) 75%,var(--cyan));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    text-shadow:0 0 60px rgba(255,46,110,.25);
  }
  .lead{color:var(--sub);font-size:12px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* 主体上下布局：上舞台 + 下控制 */
  .main{display:flex;flex-direction:column;gap:14px;flex:1;min-height:0;}

  /* 像素舞台：锁 16:9，占据剩余高度 */
  .stage{position:relative;line-height:0;flex:1;min-height:0;max-height:64vh;aspect-ratio:16/9;margin:0 auto;max-width:100%;
    background:#000;border:2px solid #2c2c2c;border-radius:12px;overflow:hidden;
    box-shadow:0 0 0 1px #000,0 12px 48px rgba(0,0,0,.85),0 0 50px rgba(155,92,255,.14);}
  canvas#stage{
    width:100%;height:100%;display:block;object-fit:contain;
    image-rendering:pixelated;image-rendering:crisp-edges;
    background:#000;cursor:pointer;
  }
  .stage::after{
    content:"";position:absolute;inset:0;pointer-events:none;border-radius:12px;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 1px, transparent 1px 3px),
      radial-gradient(ellipse at center, transparent 62%, rgba(0,0,0,.42) 100%);
  }
  .nowtag{
    position:absolute;left:14px;top:14px;font-size:12px;letter-spacing:.14em;
    color:var(--accent,#fff);font-weight:700;text-shadow:0 0 12px var(--glow,rgba(255,255,255,.5));
    background:rgba(0,0,0,.4);padding:5px 11px;border-radius:8px;border:1px solid rgba(255,255,255,.12);z-index:2;
    transition:color .5s ease,text-shadow .5s ease;   /* 切歌主题色平滑过渡 */
  }

  /* 下方布局：宽度与舞台对齐（JS 同步）· 卡片横排 4 列 + 控制行 */
  .bottom{display:flex;flex-direction:column;gap:13px;flex:none;width:100%;margin:0 auto;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;}
  .card{
    position:relative;background:var(--panel);border:1px solid var(--line);border-radius:11px;
    padding:11px 13px;backdrop-filter:blur(14px);overflow:hidden;cursor:pointer;
    transition:transform .2s, box-shadow .3s, border-color .3s;
    display:flex;align-items:center;gap:8px;min-width:0;
    container-type:inline-size;
  }
  /* 卡片自身宽度太小（装不下歌名+BPM）时，隐藏 BPM，优先保证歌名完整/省略显示 */
  @container (max-width:185px){
    .card .yr{display:none;}
  }
  .card::before{content:"";position:absolute;inset:0 auto 0 0;width:3px;height:100%;
    background:linear-gradient(180deg,var(--accent),transparent);opacity:.9;}
  .card:hover{transform:translateX(3px);box-shadow:0 10px 30px rgba(0,0,0,.5),0 0 20px var(--glow);border-color:rgba(255,255,255,.18);}
  .card.on{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 0 18px var(--glow);}
  .card .cinfo{flex:1;min-width:0;overflow:hidden;}
  .card .ctop{display:flex;align-items:baseline;gap:5px;white-space:nowrap;overflow:hidden;min-width:0;}
  /* 歌名优先：抢占空间，超长用省略号截断 */
  .card h2{font-size:13.5px;font-weight:800;color:var(--txt);overflow:hidden;text-overflow:ellipsis;flex:1 1 auto;min-width:0;}
  /* BPM(帧率)次要：空间不足时先被压缩，再不够直接隐藏，把空间让给歌名 */
  .card .yr{font-size:9.5px;color:var(--accent);font-weight:700;white-space:nowrap;flex:0 1 auto;overflow:hidden;text-overflow:ellipsis;min-width:0;}
  .card .move{font-size:10px;color:var(--sub);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card .pbtn{
    flex:none;border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:10.5px;
    color:#0a0712;padding:6px 9px;border-radius:7px;white-space:nowrap;
    background:linear-gradient(100deg,var(--accent),var(--glow));transition:transform .12s,filter .2s;
  }
  .card.on .pbtn{background:linear-gradient(100deg,#2a2440,#1a1630);color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent);}
  .card .pbtn:active{transform:scale(.95);}

  .controls{display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:center;
    padding:11px 20px;background:var(--panel);border:1px solid var(--line);border-radius:12px;backdrop-filter:blur(14px);
    width:fit-content;max-width:100%;margin:0 auto;}
  .controls label{font-size:11px;color:var(--sub);display:flex;align-items:center;gap:7px;white-space:nowrap;}
  input[type=range]{accent-color:var(--hot);width:130px;height:4px;}
  .resb{background:rgba(255,255,255,.04);color:var(--sub);border:1px solid var(--line);
    padding:5px 9px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;white-space:nowrap;}
  .resb.on{color:var(--txt);border-color:var(--violet);background:rgba(155,92,255,.14);}
  .stopAll{border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--txt);
    padding:6px 12px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700;font-size:11px;white-space:nowrap;}
  /* hover 效果只在真能悬停的设备（鼠标）生效，避免触屏点击后 hover 粘滞被误认为选中态 */
  @media (hover:hover){ .stopAll:hover{border-color:var(--hot);color:var(--hot);} }
  /* 点击后主动移除焦点高亮 */
  .stopAll:focus{outline:none;}
  .recb{border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--txt);
    padding:6px 12px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700;font-size:11px;transition:all .2s;white-space:nowrap;}
  @media (hover:hover){ .recb:hover{border-color:var(--hot);color:var(--hot);} }
  .recb.rec{background:var(--hot);color:#fff;border-color:var(--hot);animation:recpulse 1s ease-in-out infinite;}
  @keyframes recpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,46,110,.6);}50%{box-shadow:0 0 0 7px rgba(255,46,110,0);}}
  footer{text-align:center;color:var(--sub);font-size:10px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:none;}
  footer b{color:var(--gold);}
  /* 窄屏：卡片 2 列 */
  @media(max-width:760px){
    /* 手机：改为纵向滚动，不再强索一屏，避免画布被压扁拉伸、footer 被顶出 */
    body{height:auto;min-height:100vh;overflow-y:auto;overflow-x:hidden;}
    .wrap{flex:none;}
    .main{flex:none;}
    .stage{flex:none;height:auto;max-height:none;width:100%;aspect-ratio:16/9;}
    .grid{grid-template-columns:repeat(2,1fr);}
    .lead,footer{white-space:normal;}
  }
  /* 矮屏 / 手机横屏（宽>760 但高很小）：同样走安全布局，避免 stage 被 flex 压扁成细条。
     不用 height:auto+滚动，而是限制 stage 高度、由高度算宽，保证横屏也能完整显示 */
  @media (orientation:landscape) and (max-height:560px){
    body{height:auto;min-height:100vh;overflow-y:auto;overflow-x:hidden;}
    .wrap{flex:none;}
    .main{flex:none;}
    .stage{flex:none;height:auto;max-height:82vh;width:auto;aspect-ratio:16/9;margin:0 auto;}
    .lead,footer{white-space:normal;}
  }
</style>
</head>

    master.connect(comp); comp.connect(AC.destination);

  if(AC.state==='suspended') AC.resume();
}

/* 空闲预加载4首音频：消除首次点击的网络加载延迟（用 requestIdleCallback，不抢首屏渲染） */
function _preloadAudio(){
  try{
    SONGS.forEach(function(s){
      if(!s.audioSrc) return;
      var a=new Audio(); a.preload='auto'; a.src=s.audioSrc;
      // 触发浏览器缓存，不播放
      a.load && a.load();
    });
  }catch(e){}
}
if('requestIdleCallback' in window){ requestIdleCallback(_preloadAudio,{timeout:2500}); }
else { setTimeout(_preloadAudio,1200); }

==================================================================== */

/* 四阶灰度 LUT */
const IS_LE=new Uint8Array(new Uint32Array([1]).buffer)[0]===1;
const LUT=new Uint32Array(256);
for(let lv=0;lv<256;lv++){
  const lq=lv<48?0:lv<122?84:lv<200?168:255;
  LUT[lv]=IS_LE?((255<<24)|(lq<<16)|(lq<<8)|lq)>>>0:((lq<<24)|(lq<<16)|(lq<<8)|255)>>>0;
}

function playSong(song,cardEl){
  if(current && current.id===song.id){
    // 点的是当前歌：toggle 暂停/继续（与点舞台一致）。注意是【暂停】不是【停止】，保留 current 才能续播
    if(window._userPaused){
      // 暂停中→继续播放（从暂停处续）
      window._userPaused=false;
      waResume();
      nowtag.textContent="\u266a "+(song.title||"");
      refreshButtons();
      try{ if('mediaSession' in navigator) navigator.mediaSession.playbackState='playing'; }catch(e){}
    } else {
      // 播放中→暂停（不是 stopAll！stopAll 会清 current 导致再点从头播）
      window._userPaused=true;
      waPause();
      nowtag.textContent="\u23f8 "+(song.title||"");
      refreshButtons();
      try{ if('mediaSession' in navigator) navigator.mediaSession.playbackState='paused'; }catch(e){}
    }
    return;
  }
  window._userPaused=false;
  window._lastEnded=Date.now();   // 切歌时刻记为现在：挡住切歌后 600ms 内残留/杂散 ended，不影响几分钟后正常结束
  // 切歌前置空上一个 source 的 onended，避免误触发连播
  curBPM=song.bpm;   // 先置 BPM，保证节拍计算及时
  waPlay(song);      // Web Audio 播放（后台可靠）
  if(schedTimer){clearInterval(schedTimer);schedTimer=0;}
  current=song; curBPM=song.bpm; curRoutine=song.routine;
  document.querySelectorAll('.card').forEach(function(c){c.classList.remove('on');});
  if(cardEl) cardEl.classList.add('on');
  refreshButtons();
  nowtag.textContent="\u266a "+song.title;
  document.documentElement.style.setProperty('--accent',song.accent);
  document.documentElement.style.setProperty('--glow',song.glow);
  startAt=0;
  try{ if(typeof syncStopBtn==='function') syncStopBtn(); }catch(e){}
  // Media Session：锁屏/后台系统媒体控制（跨浏览器加固：每个 handler 单独 try-catch）
  try{
    if('mediaSession' in navigator){
      // 锁屏/通知栏封面：canvas 生成 PNG（iOS/安卓都认）；生成失败则回退纯色 SVG
      var coverPng=makeCover(song);
      var art;
      if(coverPng){
        art=[{src:coverPng,sizes:'512x512',type:'image/png'}];
      } else {
        var ico='data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512"><rect width="512" height="512" fill="'+(song.accent||'#222')+'"/><text x="256" y="310" font-size="320" text-anchor="middle" fill="#fff">\u266a</text></svg>');
        art=[{src:ico,sizes:'512x512',type:'image/svg+xml'}];
      }
      _lastMeta={title:song.title,artist:'Michael Jackson',album:'Pixel Dancer · 像素之王',artwork:art};
      navigator.mediaSession.metadata=new MediaMetadata(_lastMeta);
      navigator.mediaSession.playbackState='playing';
      var handlers=[
        ['play',function(){ try{ window._userPaused=false; waResume(); try{refreshButtons();}catch(_){} _reassertSession('playing'); }catch(e){} }],
        ['pause',function(){ try{ window._userPaused=true; waPause(); try{refreshButtons();}catch(_){} if(_isIOS){ try{ navigator.mediaSession.playbackState='paused'; }catch(e){} } else { _reassertSession('paused'); setTimeout(function(){ _reassertSession('paused'); },350); setTimeout(function(){ _reassertSession('paused'); },1200); } }catch(e){} }],
        ['nexttrack',function(){ try{playByIndex(curIndex()+1);}catch(e){} }],
        ['previoustrack',function(){ try{playByIndex(curIndex()-1);}catch(e){} }],
        ['stop',function(){ try{stopAll();}catch(e){} }]
      ];
      for(var hi=0;hi<handlers.length;hi++){
        try{ navigator.mediaSession.setActionHandler(handlers[hi][0],handlers[hi][1]); }catch(e){ /* 该浏览器不支持此 action，跳过 */ }
      }
    }
  }catch(e){}
}

/* 舞台点击/空格的核心：对【当前歌曲】做播放/暂停切换（不再停止回到第一首）
   - 正在播放 → 暂停（保留 current，可从暂停处继续）
   - 已暂停（current 还在）→ 继续播放当前这首
   - 从未播放过（current 与 lastSong 都没有）→ 播第一首 */
function togglePlayPause(){
  // 正在放：暂停
  if(current && !window._userPaused && audioEl && !audioEl.paused){
    window._userPaused=true;
    waPause();
    nowtag.textContent="\u23f8 "+(current.title||"");   // ⏸ 标识暂停态
    refreshButtons();   // 同步卡片按钮：当前歌显示"▶ 继续"
    try{ if('mediaSession' in navigator) navigator.mediaSession.playbackState='paused'; }catch(e){}
    return;
  }
  // 有当前歌但处于暂停态：继续
  if(current && window._userPaused){
    window._userPaused=false;
    waResume();
    nowtag.textContent="\u266a "+(current.title||"");   // ♪ 恢复播放态
    refreshButtons();   // 同步卡片按钮：当前歌显示"⏸ 暂停"
    try{ if('mediaSession' in navigator) navigator.mediaSession.playbackState='playing'; }catch(e){}
    return;
  }
  // 当前没有歌在播（current=null）但之前播过：恢复上一首
  if(!current && lastSong){
    var li=SONGS.indexOf(lastSong); if(li<0) li=0;
    playSong(SONGS[li], document.querySelectorAll('.card')[li]);
    return;
  }
  // 从未播放过：播第一首
  playSong(SONGS[0], document.querySelectorAll('.card')[0]);
}

/* ===== 录制视频：MediaRecorder 捕获 canvas 画面 + 音频流 ===== */
let recorder=null, recChunks=[], recording=false;
const recBtn=document.getElementById("recBtn");
const recHint=document.getElementById("recHint");
function pickMime(){
  const cands=["video/webm;codecs=vp9,opus","video/webm;codecs=vp8,opus","video/webm;codecs=vp9","video/webm;codecs=vp8","video/webm","video/mp4"];
  for(const m of cands) if(window.MediaRecorder && MediaRecorder.isTypeSupported(m)) return m;
  return "";
}
function startRec(){
  if(!window.MediaRecorder){ recHint.style.display=""; recHint.textContent="⚠️ 当前浏览器不支持录制（需 Chrome/Edge/Firefox）"; return; }
  // 没在播放则自动起一首，保证有画面和声音
  if(!current) playSong(SONGS[0],document.querySelectorAll('.card')[0]);
  // 画面流：iOS Safari 部分版本不支持 canvas.captureStream，兜底提示
  let vstream;
  try{ vstream = C.captureStream(30); }
  catch(e){ recHint.style.display=""; recHint.textContent="\u26a0\ufe0f 当前浏览器不支持画面录制（建议用桌面 Chrome/Edge）"; return; }
  let stream=vstream;
  try{
    // 录音取流：直接从 audioEl 抓流（不用 createMediaElementSource 劫持音频路由，
    // 避免录制后正常播放/音量异常——这是之前录制副作用的根因）
    if(typeof audioEl.captureStream==='function'){
      const astream=audioEl.captureStream();
      const atracks=astream.getAudioTracks();
      if(atracks.length){ stream=new MediaStream([...vstream.getVideoTracks(),...atracks]); }
    }
  }catch(e){ /* 抓音频失败则仅录画面，不影响播放 */ }
  const mime=pickMime();
  recChunks=[];
  recorder=new MediaRecorder(stream, mime?{mimeType:mime,videoBitsPerSecond:6000000}:undefined);
  recorder.ondataavailable=e=>{ if(e.data && e.data.size>0) recChunks.push(e.data); };
  recorder.onstop=()=>{
    const blob=new Blob(recChunks,{type:mime||"video/webm"});
    const url=URL.createObjectURL(blob);
    const ext=(mime.indexOf("mp4")>=0)?"mp4":"webm";
    const a=document.createElement("a");
    a.href=url; a.download="MJ_"+(current?current.id:"dance")+"_"+Date.now()+"."+ext;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),4000);
    recHint.style.display=""; recHint.textContent="✅ 视频已生成并下载（."+ext+"）· 可用播放器打开或分享";
  };
  recorder.start();
  recording=true;
  recBtn.classList.add("rec"); recBtn.textContent="⏹ 保存";
  recHint.style.display=""; recHint.textContent="🔴 录制中…再点一次停止并自动下载（建议录 10–20 秒）";
}
function stopRec(){
  if(recorder && recording){ recorder.stop(); recording=false; recBtn.classList.remove("rec"); recBtn.textContent="⏺ 录制"; }
}
recBtn.addEventListener("click",()=>{ recording?stopRec():startRec(); });

/* ====================================================================
   PART 4 · 主渲染循环（舞蹈节拍 = 音乐时钟）
==================================================================== */
let frameCount=0;
let glideGlow=0; // 残影强度平滑系数（避免拖影开关抖动）
/* 残影历史环：保存最近若干帧的姿势快照 + 位置 + 缩放 */
const GHOST_MAX=10;
const ghostBuf=[];
function pushGhost(x,sx){
  const snap={};
  for(let j=0;j<JOINTS.length;j++){const n=JOINTS[j];snap[n]=[pose[n][0],pose[n][1]];}
  ghostBuf.push({x,sx,snap});
  if(ghostBuf.length>GHOST_MAX) ghostBuf.shift();
}
// 逻辑暂停：iOS 静音保活时 audio.paused=false（为了锁屏不撤），但画面/舞蹈应视为暂停
// → 把 _iosMuted 和 _userPaused 也算作暂停，否则点暂停后舞者还在跳=“无法暂停”
function _isPaused(){ return !audioEl || audioEl.paused || audioEl.ended || window._iosMuted || window._userPaused; }
function getBeats(){
  if(current && !_isPaused()){
    var off=(current&&current.beatOffset)?current.beatOffset:0;
    var b=(waElapsed() - off)*curBPM/60;
    return b>0?b:0;
  }
  return 0;
}
let _lastFrameTs=0;
function frame(ts){
  requestAnimationFrame(frame);
  // 页面在后台（隐藏）时，画面看不见——完全跳过渲染，避免 getImageData 等重计算抢占主线程拖累后台音频解码（后台卡顿根因）
  if(document.hidden){ return; }
  const dancing=!!current;
  // 待机时降到 ~20fps，省电省 CPU；播放时全速跟拍
  if(!dancing){
    if(ts && _lastFrameTs && (ts-_lastFrameTs)<48) return;
    _lastFrameTs=ts||0;
  }
  frameCount++;
  const beats=dancing?getBeats():0.0001;
  const rIdx=dancing?curRoutine:0;
  const o=evalRoutine(beats,rIdx);
  let pulse=1-(beats%1); pulse*=pulse;

  X.setTransform(1,0,0,1,0,0);
  X.drawImage(BG,0,0);
  X.setTransform(RES,0,0,RES,0,0);

  // 聚光灯
  X.fillStyle="rgba(255,255,255,.30)";
  X.beginPath();X.ellipse(o.x,G+7,26+6*pulse,5,0,0,6.2832);X.fill();

  // 地砖灯光（按 routine 风格）
  if(dancing){
    if(rIdx===0){
      lightTile(o.x+o.sx*SC*pose.lt[0],1);
      lightTile(o.x+o.sx*SC*pose.rt[0],1);
    }else if(rIdx===1){
      lightTile((((beats*2)|0)%NT)*TILE+2,.85);
      lightTile(o.x+o.sx*SC*pose.rt[0],1);
    }else{
      if(beats%4<.12) for(let a=0;a<NT;a+=2) lightTile(a*TILE+2,.55);
      lightTile(o.x+o.sx*SC*pose.rt[0],1);
    }
  }
  for(let i=0;i<NT;i++){
    const v=tiles[i];
    if(v>.03){
      X.fillStyle="rgba(255,255,255,"+(v*.9).toFixed(3)+")";
      X.fillRect(i*TILE+1,G+1,TILE-1,H-G-2);
      tiles[i]=v*.9;
    }
  }

  // 参考干净渲染方式：移除残影拖尾 + 钉地闪光（逐帧开关型特效是闪烁根源）。
  // 每帧只画 背景 + 人物 + 话筒 + 灰度量化，稳定无闪。
  drawFigure(o.x,o.sx,frameCount);
  drawMic(); // 话筒画在人物之后：主体经过时被遮挡，舞台纵深感

  // 四阶灰度量化（失败不崩；高分辨率移动端隔帧量化省 CPU）
  X.setTransform(1,0,0,1,0,0);
  try{
    // 720p+ 时隔帧量化（视觉差异小，CPU 减半），320p/480p 全帧
    if(C.width>720 && (frameCount&1)) { /* 隔帧跳过 */ }
    else {
      const img=X.getImageData(0,0,C.width,C.height);
      const d32=new Uint32Array(img.data.buffer);
      if(IS_LE) for(let n=0;n<d32.length;n++) d32[n]=LUT[d32[n]&255];
      else for(let n2=0;n2<d32.length;n2++) d32[n2]=LUT[(d32[n2]>>>24)&255];
      X.putImageData(img,0,0);
    }
  }catch(e){ /* getImageData 在某些跨域/状态异常下抛错，跳过这帧不影响整体 */ }
}
requestAnimationFrame(frame);
/* 切回前台时重置帧时间戳并确保播放继续，避免后台积压导致的瞬时卡顿 */
document.addEventListener('visibilitychange',function(){
  if(!document.hidden){
    _lastFrameTs=0;
    if(current && audioEl && audioEl.paused && !window._userPaused){ try{audioEl.play();}catch(e){} }
  }
});

/* 卡片栏宽度同步为舞台实际宽度（舞台高度变化时联动） */
function syncWidth(){
  const stage=document.querySelector('.stage');
  const bottom=document.querySelector('.bottom');
  if(stage && bottom){
    const w=stage.getBoundingClientRect().width;
    // 只在拿到有效宽度时才设置；旋转瞬间可能为 0，跳过避免元素塌缩
    if(w>0){ bottom.style.width=Math.round(w)+'px'; }
    else { bottom.style.width=''; }
  }
}
/* 旋转/缩放后多次重算，等浏览器布局稳定；并强制重绘背景 */
function relayout(){
  syncWidth();
  try{ if(typeof buildBG==='function') buildBG(); }catch(e){}
}
window.addEventListener('resize',relayout);
window.addEventListener('orientationchange',function(){
  // orientationchange 后布局未必立即稳定，分多次重算
  relayout();
  setTimeout(relayout,120); setTimeout(relayout,300);
  setTimeout(relayout,600); setTimeout(relayout,1000);
});
// 首帧与随后几次（等布局稳定）
relayout();
setTimeout(relayout,60); setTimeout(relayout,200); setTimeout(relayout,500);
</script>
